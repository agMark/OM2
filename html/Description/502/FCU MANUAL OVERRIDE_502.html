<p>
    The FCU override is optionally installed in AT-502/504 series aircraft. It provides a means to override engine fuel
    control in the event of certain FCU failures.
</p>

<p>
    The system consists of a control handle mounted on left-hand side of the cockpit and a control cable that
    runs to the FCU as shown in <xref fileTarget="img_502_FCU.png"></xref>.
</p>
